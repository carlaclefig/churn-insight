# ─── Servidor ───────────────────────────────────────────
server.port=8080

# ─── Nombre de la app ───────────────────────────────────
spring.application.name=churn-insight

# ─── Archivos de recursos ───────────────────────────────
app.onnx.model-path=modelo_churn_final.onnx
app.csv.data-path=customer_churn_dataset.csv
app.dashboard.stats-path=dashboard_stats.json

# ─── LLM (Claude - lo usaremos en fase posterior) ───────
app.anthropic.api-key=YOUR_API_KEY_HERE
app.anthropic.model=claude-sonnet-4-20250514
app.anthropic.max-tokens=1500

# ─── Logs ───────────────────────────────────────────────
logging.level.com.churninsight=DEBUG
logging.level.root=INFO